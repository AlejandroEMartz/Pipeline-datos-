name: Daily News Pipeline

on:
  schedule:
    # Se ejecuta todos los días a las 12:00 PM UTC (puedes ajustar la hora)
    - cron: '0 12 * * *'
  # Permite ejecución manual desde la interfaz de GitHub Actions
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run pipeline script
      env:
        TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
        TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
        TWILIO_WHATSAPP_TO: ${{ secrets.TWILIO_WHATSAPP_TO }}
      run: |
        python pipeline.py

    - name: Upload spreadsheet artifact
      uses: actions/upload-artifact@v3
      with:
        name: daily-news-spreadsheet
        path: noticias_*.csv
